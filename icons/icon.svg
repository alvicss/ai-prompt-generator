<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1520"/>
      <stop offset="100%" style="stop-color:#0a0e14"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a7ad4"/>
      <stop offset="100%" style="stop-color:#2ec4b6"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a7ad4;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#2ec4b6;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="90" fill="url(#bgGrad)"/>

  <!-- 光暈裝飾 -->
  <ellipse cx="256" cy="256" rx="180" ry="140" fill="url(#glowGrad)" filter="url(#glow)"/>

  <!-- 邊框光線 -->
  <rect width="512" height="512" rx="90" fill="none"
    stroke="url(#textGrad)" stroke-width="3" opacity="0.4"/>

  <!-- 星星裝飾（左上） -->
  <g fill="#2ec4b6" opacity="0.7">
    <polygon points="80,70 85,85 100,85 88,94 93,110 80,100 67,110 72,94 60,85 75,85"
      transform="scale(0.7) translate(50,30)"/>
  </g>

  <!-- 星星裝飾（右下） -->
  <g fill="#1a7ad4" opacity="0.6">
    <polygon points="80,70 85,85 100,85 88,94 93,110 80,100 67,110 72,94 60,85 75,85"
      transform="translate(340,340) scale(0.5)"/>
  </g>

  <!-- 小圓點裝飾 -->
  <circle cx="100" cy="380" r="6" fill="#2ec4b6" opacity="0.5"/>
  <circle cx="420" cy="130" r="4" fill="#1a7ad4" opacity="0.6"/>
  <circle cx="390" cy="400" r="8" fill="#2ec4b6" opacity="0.3"/>
  <circle cx="130" cy="110" r="5" fill="#1a7ad4" opacity="0.5"/>

  <!-- 主文字「魔咒」 -->
  <text
    x="256"
    y="310"
    font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif"
    font-size="195"
    font-weight="900"
    fill="url(#textGrad)"
    text-anchor="middle"
    dominant-baseline="auto"
    filter="url(#glow)"
  >魔咒</text>

  <!-- 底部細線裝飾 -->
  <line x1="156" y1="345" x2="356" y2="345"
    stroke="url(#textGrad)" stroke-width="2" opacity="0.4"/>
</svg>
